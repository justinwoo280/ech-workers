# Local SOCKS5 proxy on 127.0.0.1:1080 forwarding through an EWP
# v2 tunnel (X25519+ML-KEM-768 hybrid, ChaCha20-Poly1305).

inbounds:
  - tag: local-socks
    type: socks5
    listen: "127.0.0.1:1080"
    # Uncomment to require authentication (recommended for non-loopback):
    # users:
    #   alice: "s3cret"

outbounds:
  - tag: my-vps
    type: ewpclient
    uuid: "01020304-0506-0708-090a-0b0c0d0e0f10"
    transport:
      kind: websocket
      url: "wss://example.com/ewp"
      sni: "example.com"
      ech: true

router:
  default: my-vps

ech:
  bootstrap_doh:
    servers:
      - "https://1.1.1.1/dns-query"
      - "https://dns.google/dns-query"

# server_name_dns: how the *client* resolves the upstream EWP server's
# domain name to an IP at Dial time. Without this block the OS resolver
# is used and the local ISP sees every "my-vps.example.com" lookup.
# With it, only DoH traffic to 1.1.1.1 / 8.8.8.8 is visible.
#
# Independent of `ech.bootstrap_doh:` (one-shot ECH config fetch) and
# `dns:` (server-side resolver for destinations users ask for).
server_name_dns:
  doh:
    servers:
      - "https://1.1.1.1/dns-query"
      - "https://dns.google/dns-query"
  prefer_ipv6: false
