# Typical VPS server: terminate EWP over WebSocket+TLS, exit to the
# real internet via direct outbound. All DOMAIN targets requested by
# clients are resolved through DoH (cached, never the box's ISP DNS).

inbounds:
  - tag: ewp-in
    type: ewpserver
    uuids:
      - "01020304-0506-0708-090a-0b0c0d0e0f10"
    transport:
      kind: websocket
      url: "0.0.0.0:443"
      path: "/ewp"
      cert: "/etc/letsencrypt/live/example.com/fullchain.pem"
      key:  "/etc/letsencrypt/live/example.com/privkey.pem"

outbounds:
  - tag: out
    type: direct

router:
  default: out

dns:
  server:
    upstream:
      servers:
        - "https://1.1.1.1/dns-query"
        - "https://dns.google/dns-query"
      cache_size: 16384
      worker_pool: 16
      min_ttl_sec: 30
      max_ttl_sec: 3600

# Reflexive address discovery for PROBE_RESP. At startup the binary
# concurrently asks each STUN server "what's my public ip:port?", caches
# the answer, and returns it to clients that send a UDP_PROBE_REQ. Skip
# this block to silently disable PROBE_RESP (clients still get a
# fall-back default and most NAT diagnostics still work).
stun:
  servers:
    - "stun.cloudflare.com:3478"
    - "stun.l.google.com:19302"
