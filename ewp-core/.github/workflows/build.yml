name: Build ECH-Workers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-client:
    name: Build Client (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, suffix: .exe }
          - { goos: windows, goarch: arm64, suffix: .exe }
          - { goos: linux,   goarch: amd64, suffix: ""   }
          - { goos: linux,   goarch: arm64, suffix: ""   }
          - { goos: darwin,  goarch: amd64, suffix: ""   }
          - { goos: darwin,  goarch: arm64, suffix: ""   }
          - { goos: freebsd, goarch: amd64, suffix: ""   }
          - { goos: freebsd, goarch: arm64, suffix: ""   }

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Build
        run: |
          cd cmd/client
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o ../../ewp-core-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ewp-core-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  build-server:
    name: Build Server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: ""   }
          - { goos: linux,   goarch: arm64, suffix: ""   }
          - { goos: windows, goarch: amd64, suffix: .exe }
          - { goos: windows, goarch: arm64, suffix: .exe }
          - { goos: darwin,  goarch: amd64, suffix: ""   }
          - { goos: darwin,  goarch: arm64, suffix: ""   }
          - { goos: freebsd, goarch: amd64, suffix: ""   }
          - { goos: freebsd, goarch: arm64, suffix: ""   }

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Build
        run: |
          cd cmd/server
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o ../../ewp-core-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ewp-core-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    name: Create Release
    needs: [build-client, build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
